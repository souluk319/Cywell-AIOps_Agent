apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cywellaisentinels.ai.cywell.co.kr
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: operator-crd
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  group: ai.cywell.co.kr
  scope: Namespaced
  names:
    plural: cywellaisentinels
    singular: cywellaisentinel
    kind: CywellAISentinel
    shortNames:
      - cas
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Edition
          type: string
          jsonPath: .spec.edition
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Version
          type: string
          jsonPath: .status.version
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                edition:
                  type: string
                  default: komsco
                mode:
                  type: string
                  enum:
                    - readOnly
                  default: readOnly
                provider:
                  type: string
                  enum:
                    - openshift-lightspeed
                  default: openshift-lightspeed
                targetNamespace:
                  type: string
                  default: cywell-ai-sentinel
                images:
                  type: object
                  properties:
                    gateway:
                      type: string
                    consolePlugin:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                reason:
                  type: string
                version:
                  type: string
                targetNamespace:
                  type: string
                gatewayImage:
                  type: string
                consolePluginImage:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                lastReconciledAt:
                  type: string
                applied:
                  type: array
                  items:
                    type: string
