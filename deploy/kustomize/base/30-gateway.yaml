apiVersion: apps/v1
kind: Deployment
metadata:
  name: cas-gateway
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-ai-sentinel
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: cywell-ai-sentinel
    spec:
      serviceAccountName: cas-gateway
      automountServiceAccountToken: false
      containers:
        - name: gateway
          image: image-registry.openshift-image-registry.svc:5000/cywell-ai-sentinel/cas-gateway:dev
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "9443"
            - name: CAS_TLS_CERT_FILE
              value: /var/run/secrets/cas/tls/tls.crt
            - name: CAS_TLS_KEY_FILE
              value: /var/run/secrets/cas/tls/tls.key
            - name: CAS_BRAIN_PROVIDER
              value: openshift-lightspeed
            - name: CAS_LIGHTSPEED_URL
              value: https://lightspeed-app-server.openshift-lightspeed.svc.cluster.local:8443
            - name: CAS_LIGHTSPEED_TIMEOUT_MS
              value: "90000"
            - name: CAS_LIGHTSPEED_TLS_INSECURE
              value: "true"
            - name: CAS_EVIDENCE_PROVIDER
              value: openshift-api
            - name: CAS_OPENSHIFT_API_URL
              value: https://kubernetes.default.svc
            - name: CAS_OPENSHIFT_API_TLS_INSECURE
              value: "true"
            - name: CAS_EVIDENCE_TIMEOUT_MS
              value: "8000"
            - name: CAS_KNOWLEDGE_OWNER_IDENTITY_MODE
              value: openshift-selfsubjectreview
            - name: CAS_KNOWLEDGE_OWNER_IDENTITY_TIMEOUT_MS
              value: "3000"
            - name: CAS_KNOWLEDGE_ENGINE_URL
              value: http://cas-knowledge-engine.cywell-ai-sentinel.svc.cluster.local:8080
            - name: CAS_KNOWLEDGE_ENGINE_TIMEOUT_MS
              value: "30000"
            - name: CAS_KNOWLEDGE_OWNER_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: cas-knowledge-internal-auth
                  key: owner-hmac-secret
            - name: CAS_MAX_REQUEST_BYTES
              value: "26214400"
          ports:
            - name: https
              containerPort: 9443
          readinessProbe:
            httpGet:
              path: /api/aiops/healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: service-serving-cert
              mountPath: /var/run/secrets/cas/tls
              readOnly: true
      volumes:
        - name: service-serving-cert
          secret:
            secretName: cas-gateway-tls
---
apiVersion: v1
kind: Service
metadata:
  name: cas-gateway
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: cywell-ai-sentinel
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: cas-gateway-tls
spec:
  selector:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: gateway
  ports:
    - name: https
      port: 9443
      targetPort: https
