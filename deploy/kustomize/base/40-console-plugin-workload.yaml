apiVersion: apps/v1
kind: Deployment
metadata:
  name: cas-console-plugin
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: console-plugin
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: console-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-ai-sentinel
        app.kubernetes.io/component: console-plugin
        app.kubernetes.io/part-of: cywell-ai-sentinel
    spec:
      automountServiceAccountToken: false
      containers:
        - name: console-plugin
          image: image-registry.openshift-image-registry.svc:5000/cywell-ai-sentinel/cas-console-plugin:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "9443"
            - name: CAS_GATEWAY_URL
              value: https://cas-gateway:9443
            - name: CAS_CONSOLE_TLS_CERT_FILE
              value: /var/run/secrets/cas/tls/tls.crt
            - name: CAS_CONSOLE_TLS_KEY_FILE
              value: /var/run/secrets/cas/tls/tls.key
          ports:
            - name: https
              containerPort: 9443
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: service-serving-cert
              mountPath: /var/run/secrets/cas/tls
              readOnly: true
      volumes:
        - name: service-serving-cert
          secret:
            secretName: cas-console-plugin-tls
---
apiVersion: v1
kind: Service
metadata:
  name: cas-console-plugin
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: console-plugin
    app.kubernetes.io/part-of: cywell-ai-sentinel
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: cas-console-plugin-tls
spec:
  selector:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: console-plugin
  ports:
    - name: https
      port: 9443
      targetPort: https

