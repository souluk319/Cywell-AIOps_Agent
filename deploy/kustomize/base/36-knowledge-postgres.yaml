apiVersion: v1
kind: ServiceAccount
metadata:
  name: cas-knowledge-db
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-postgres
    app.kubernetes.io/part-of: cywell-ai-sentinel
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cas-knowledge-db-anyuid
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-postgres
    app.kubernetes.io/part-of: cywell-ai-sentinel
subjects:
  - kind: ServiceAccount
    name: cas-knowledge-db
    namespace: cywell-ai-sentinel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
---
apiVersion: v1
kind: Secret
metadata:
  name: cas-knowledge-postgres
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-postgres
    app.kubernetes.io/part-of: cywell-ai-sentinel
type: Opaque
stringData:
  database: cas_knowledge
  username: cas_knowledge
  password: cas_knowledge_dev
  database-url: postgresql://cas_knowledge:cas_knowledge_dev@cas-knowledge-postgres.cywell-ai-sentinel.svc.cluster.local:5432/cas_knowledge
---
apiVersion: v1
kind: Service
metadata:
  name: cas-knowledge-postgres
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-postgres
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  selector:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cas-knowledge-postgres
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-postgres
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  serviceName: cas-knowledge-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: knowledge-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-ai-sentinel
        app.kubernetes.io/component: knowledge-postgres
        app.kubernetes.io/part-of: cywell-ai-sentinel
    spec:
      serviceAccountName: cas-knowledge-db
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: cas-knowledge-postgres
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cas-knowledge-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cas-knowledge-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: cywell-ai-sentinel
          app.kubernetes.io/component: knowledge-postgres
          app.kubernetes.io/part-of: cywell-ai-sentinel
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cas-knowledge-postgres-ingress
  namespace: cywell-ai-sentinel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: knowledge-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cywell-ai-sentinel
              app.kubernetes.io/component: knowledge-engine
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cas-knowledge-postgres-egress
  namespace: cywell-ai-sentinel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: knowledge-postgres
  policyTypes:
    - Egress
  egress: []
