apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cas-gateway-ingress
  namespace: cywell-ai-sentinel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-console
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cywell-ai-sentinel
              app.kubernetes.io/component: console-plugin
      ports:
        - protocol: TCP
          port: 9443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cas-gateway-egress
  namespace: cywell-ai-sentinel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
        - ipBlock:
            cidr: 10.217.4.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
    - to:
        - ipBlock:
            cidr: 10.217.4.1/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 192.168.126.11/32
      ports:
        - protocol: TCP
          port: 6443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-lightspeed
          podSelector:
            matchLabels:
              app.kubernetes.io/name: lightspeed-service-api
      ports:
        - protocol: TCP
          port: 8443
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cywell-ai-sentinel
              app.kubernetes.io/component: knowledge-engine
      ports:
        - protocol: TCP
          port: 8080
---
