apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cas-knowledge-engine-data
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-engine
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cas-knowledge-engine
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-engine
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: knowledge-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-ai-sentinel
        app.kubernetes.io/component: knowledge-engine
        app.kubernetes.io/part-of: cywell-ai-sentinel
    spec:
      automountServiceAccountToken: false
      containers:
        - name: knowledge-engine
          image: image-registry.openshift-image-registry.svc:5000/cywell-ai-sentinel/cas-knowledge-engine:dev
          imagePullPolicy: Always
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: CAS_KNOWLEDGE_DATA_DIR
              value: /var/lib/cas-knowledge
            - name: CAS_KNOWLEDGE_PROVIDER
              value: pbs-compatible-local
            - name: CAS_KNOWLEDGE_OWNER_MODE
              value: trusted-header
            - name: CAS_KNOWLEDGE_SINGLE_OWNER
              value: cas-crc-dev
            - name: CAS_KNOWLEDGE_REQUIRE_OWNER_HEADER
              value: "true"
            - name: CAS_KNOWLEDGE_OWNER_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: cas-knowledge-internal-auth
                  key: owner-hmac-secret
            - name: CAS_KNOWLEDGE_MAX_REQUEST_BYTES
              value: "26214400"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cas-knowledge-postgres
                  key: database-url
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/knowledge/healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: knowledge-data
              mountPath: /var/lib/cas-knowledge
      volumes:
        - name: knowledge-data
          persistentVolumeClaim:
            claimName: cas-knowledge-engine-data
---
apiVersion: v1
kind: Service
metadata:
  name: cas-knowledge-engine
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-engine
    app.kubernetes.io/part-of: cywell-ai-sentinel
spec:
  selector:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: knowledge-engine
  ports:
    - name: http
      port: 8080
      targetPort: http
