apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - pbs-egress-networkpolicy.yaml
configMapGenerator:
  - name: cas-pbs-config
    namespace: cywell-ai-sentinel
    literals:
      - base-url=https://playbookstudio-runtime.playbookstudio.svc.cluster.local:8765
      - auth-mode=service-token
      - timeout-ms=10000
      - max-response-bytes=5242880
      - tls-insecure=false
generatorOptions:
  disableNameSuffixHash: true
patches:
  - path: knowledge-engine-pbs-shadow-patch.yaml
