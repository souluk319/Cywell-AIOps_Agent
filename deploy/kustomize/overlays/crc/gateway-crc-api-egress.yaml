apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cas-gateway-crc-api-egress
  namespace: cywell-ai-sentinel
  labels:
    app.kubernetes.io/name: cywell-ai-sentinel
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: cywell-ai-sentinel
    cywell.io/lab-scope: crc-dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-ai-sentinel
      app.kubernetes.io/component: gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.217.4.1/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 192.168.126.11/32
      ports:
        - protocol: TCP
          port: 6443
