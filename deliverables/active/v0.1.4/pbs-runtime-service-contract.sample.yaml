apiVersion: v1
kind: Namespace
metadata:
  name: playbookstudio
  labels:
    kubernetes.io/metadata.name: playbookstudio
---
apiVersion: v1
kind: Service
metadata:
  name: playbookstudio-runtime
  namespace: playbookstudio
  labels:
    app.kubernetes.io/name: playbookstudio
    app.kubernetes.io/component: runtime
spec:
  selector:
    app.kubernetes.io/name: playbookstudio
    app.kubernetes.io/component: runtime
  ports:
    - name: https-runtime
      protocol: TCP
      port: 8765
      targetPort: 8765
---
apiVersion: v1
kind: Pod
metadata:
  name: playbookstudio-runtime-label-contract
  namespace: playbookstudio
  labels:
    app.kubernetes.io/name: playbookstudio
    app.kubernetes.io/component: runtime
spec:
  containers:
    - name: runtime
      image: example.invalid/playbookstudio/runtime:replace-me
      ports:
        - name: https-runtime
          containerPort: 8765
          protocol: TCP
