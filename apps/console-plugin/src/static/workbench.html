<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAS Local Workbench</title>
  <link rel="stylesheet" href="./workbench.css" />
</head>
<body>
  <main class="workbench" data-sidebar="open">
    <aside class="sidebar" aria-label="Conversation sidebar">
      <div class="sidebar-actions">
        <button class="sidebar-action" id="new-chat" type="button">새 대화</button>
        <button class="sidebar-action" id="save-chat" type="button">현재 대화 저장</button>
      </div>
      <label class="search-label">
        <span>검색</span>
        <input id="conversation-search" autocomplete="off" placeholder="대화, 대상, 답변 검색" />
      </label>
      <section class="conversation-section">
        <div class="section-title">
          <strong>RCA 대화</strong>
          <span id="conversation-count">0</span>
        </div>
        <div class="conversation-list" id="conversation-list"></div>
      </section>
    </aside>

    <section class="main">
      <header class="topbar">
        <button class="icon-button" id="toggle-sidebar" type="button" title="대화 사이드바">☰</button>
        <div class="title">
          <strong>Cywell AI Sentinel</strong>
          <span>KOMSCO EDITION</span>
        </div>
        <div class="target">
          <select id="namespace">
            <option value="__all_namespaces__">모든 네임스페이스</option>
            <option value="default">default</option>
            <option value="komsco-batch">komsco-batch</option>
            <option value="komsco-secure">komsco-secure</option>
          </select>
          <select id="kind">
            <option>Namespace</option>
            <option>Pod</option>
            <option>Deployment</option>
            <option>ClusterVersion</option>
          </select>
          <input id="resource-name" value="__all_namespaces__" />
        </div>
      </header>

      <section class="chat" id="chat-thread" aria-live="polite"></section>

      <form class="composer" id="composer">
        <textarea id="question" placeholder="무엇을 확인할까요?">모든 namespace의 Warning 이벤트, Pending Pod, 재시작 증가, 위험 workload를 비교해서 지금 우선 확인할 장애 후보를 정리해줘.</textarea>
        <div class="composer-tools">
          <button class="mode" id="mode-button" type="button" data-mode="troubleshooting">Troubleshooting</button>
          <button class="send" id="send-button" type="submit" title="전송">➤</button>
        </div>
      </form>
    </section>
  </main>
  <script type="module" src="./workbench.js"></script>
</body>
</html>
